<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exam Results | CBT Portal</title>
<script>try { const t = localStorage.getItem('selectedExamTitle'); if(t) document.title = t + ' — Results'; } catch(e){}</script>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/results.css"/>

</head>
<body class="results-layout">

<header class="results-header">
  <div class="header-content">
    <div class="brand">
      <img src="img/prep4jamb.png" alt="Logo"/>
      <h1>UTME CBT Results</h1>
    </div>
    <button class="btn-back" onclick="goToDashboard()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back to Dashboard
    </button>
  </div>
</header>

<main class="results-container">
  <!-- Performance Summary Card -->
  <div class="score-hero-card">
    <div class="candidate-meta">
      <h2 id="student-name">Candidate Name</h2>
      <p id="student-id">Registration Number: 00000000</p>
      <p id="exam-info" style="font-weight: 700; color: #38bdf8; margin-top: 8px; font-size: 15px;">Exam Title</p>
      <p id="exam-date" style="font-size: 11px; margin-top: 4px;">Attempted on: --/--/----</p>
    </div>

    <!-- Circular Progress Ring -->
    <div class="score-ring-large">
      <svg width="180" height="180">
        <circle stroke="rgba(255,255,255,0.06)" stroke-width="8" fill="transparent" r="80" cx="90" cy="90"/>
        <circle id="pct-ring" stroke="#10b981" stroke-width="8" fill="transparent" r="80" cx="90" cy="90" stroke-dasharray="502.6" stroke-dashoffset="502.6"/>
      </svg>
      <span class="pct-text" id="pct-text">0</span>
      <span id="pct-label" style="font-size:13px; color:#94a3b8; display:block; margin-top:-4px; font-weight:700;">/ 400</span>
    </div>

    <!-- Per-subject score cards -->
    <div class="stats-grid-row" id="subject-score-cards" style="flex-wrap:wrap; gap:10px;"></div>
  </div>

  <!-- Detailed Review Title -->
  <div id="subject-breakdown" style="display:none; text-align:center; background:#1e293b; color:#94a3b8; padding:12px 20px; border-radius:10px; margin:0 auto 24px; max-width:700px; font-size:13px; letter-spacing:0.3px;"></div>

  <h3 class="review-section-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
    Detailed Question Review & Corrections
  </h3>

  <!-- Detailed Questions List -->
  <div class="review-list" id="review-list">
    <!-- Question cards injected here -->
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
      const dataStr = localStorage.getItem('lastExamResult');
      if (!dataStr) { window.location.href = 'selection.html'; return; }
      // Clear after reading so revisiting the page doesn't show stale results
      localStorage.removeItem('lastExamResult');
      const result = JSON.parse(dataStr);

      document.getElementById('student-name').textContent = result.studentName;
      document.getElementById('student-id').textContent = `Registration Number: ${result.studentId}`;
      document.getElementById('exam-info').textContent = result.examTitle;
      document.getElementById('exam-date').textContent = `Submitted on: ${result.submittedAt}`;
      document.title = result.examTitle + ' — Results';

      // ── Score ring ──
      const hasJamb = result.jambScore && result.jambScore > 0;
      const jambScore = hasJamb ? result.jambScore : 0;
      const maxJamb = result.subjectScores ? result.subjectScores.length * 100 : 400;
      const ringPct = maxJamb > 0 ? jambScore / maxJamb : 0; // 0–1

      document.getElementById('pct-text').textContent = hasJamb ? Math.round(jambScore) : Math.round(parseFloat(result.percentage) || 0) + '%';
      document.getElementById('pct-label').textContent = hasJamb ? `/ ${maxJamb}` : '';

      const ring = document.getElementById('pct-ring');
      const circumference = 2 * Math.PI * 80;
      ring.style.strokeDasharray = `${circumference} ${circumference}`;
      ring.style.strokeDashoffset = circumference - ringPct * circumference;

      const color = jambScore < maxJamb * 0.4 ? '#ef4444' : jambScore < maxJamb * 0.7 ? '#f59e0b' : '#10b981';
      ring.setAttribute('stroke', color);
      document.getElementById('pct-text').style.color = color;

      // ── Per-subject score cards ──
      const cardsEl = document.getElementById('subject-score-cards');
      const subjectScores = result.subjectScores || [];

      if (subjectScores.length > 0) {
          subjectScores.forEach(s => {
              const card = document.createElement('div');
              card.className = 'stat-metric-card';
              card.style.cssText = 'min-width:120px; flex:1;';
              const scoreColor = s.scaled < 40 ? '#ef4444' : s.scaled < 70 ? '#f59e0b' : '#10b981';
              card.innerHTML = `
                  <span class="value" style="color:${scoreColor}; font-size:22px;">${Math.round(s.scaled)}</span>
                  <span class="label" style="font-size:10px; text-transform:uppercase; letter-spacing:0.5px;">${s.subject}</span>
                  <span style="font-size:10px; color:#64748b;">${s.correct}/${s.pool} correct</span>
              `;
              cardsEl.appendChild(card);
          });
          // Aggregate card
          const aggCard = document.createElement('div');
          aggCard.className = 'stat-metric-card correct';
          aggCard.style.cssText = 'min-width:120px; flex:1; border:2px solid #10b981;';
          aggCard.innerHTML = `
              <span class="value" style="font-size:22px;">${Math.round(jambScore)}</span>
              <span class="label" style="font-size:10px; text-transform:uppercase; letter-spacing:0.5px;">Total Score</span>
              <span style="font-size:10px; color:#64748b;">out of ${maxJamb}</span>
          `;
          cardsEl.appendChild(aggCard);
      } else {
          // Fallback: simple correct/total cards
          cardsEl.innerHTML = `
              <div class="stat-metric-card"><span class="value">${result.total || 0}</span><span class="label">Questions</span></div>
              <div class="stat-metric-card correct"><span class="value">${result.score || 0}</span><span class="label">Correct</span></div>
              <div class="stat-metric-card incorrect"><span class="value">${(result.total || 0) - (result.score || 0)}</span><span class="label">Incorrect</span></div>
          `;
      }

      // ── Subject breakdown text bar ──
      if (result.subjectBreakdown) {
          const breakdownEl = document.getElementById('subject-breakdown');
          if (breakdownEl) {
              breakdownEl.style.display = 'block';
              breakdownEl.textContent = result.subjectBreakdown.replace(/\|/g, ' · ');
          }
      }

      // ── Question review list ──
      const container = document.getElementById('review-list');
      container.innerHTML = '';

      if (!result.questions || result.questions.length === 0) {
          container.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">No question review details available.</div>';
          return;
      }

      result.questions.forEach((q, index) => {
          const answerRecord = result.answers ? result.answers.find(a => a.questionId === q.questionId) : null;
          const selectedAnswer = answerRecord ? answerRecord.selectedAnswer : null;

          // Determine correctness using correctIndex (offline) or correctAnswer (server)
          let isCorrect = false;
          const isUnanswered = selectedAnswer === null;

          if (!isUnanswered) {
              if (q.correctIndex !== undefined) {
                  const correctOpt = q.options[q.correctIndex];
                  isCorrect = correctOpt && selectedAnswer.trim().toLowerCase() === correctOpt.trim().toLowerCase();
              } else if (q.correctAnswer) {
                  isCorrect = q.correctAnswer.trim().toLowerCase() === selectedAnswer.trim().toLowerCase();
              }
          }

          const card = document.createElement('div');
          card.className = `review-card ${isUnanswered ? 'unanswered-item' : (isCorrect ? 'correct-item' : 'incorrect-item')}`;

          const badgeHtml = isUnanswered
              ? '<span class="badge unanswered">Unanswered</span>'
              : isCorrect ? '<span class="badge correct">Correct</span>'
              : '<span class="badge incorrect">Incorrect</span>';

          const correctOpt = q.correctIndex !== undefined ? q.options[q.correctIndex] : q.correctAnswer;

          let optionsHtml = '';
          q.options.forEach((opt, optIdx) => {
              const letter = String.fromCharCode(65 + optIdx);
              const isOptSelected = selectedAnswer !== null && opt.trim().toLowerCase() === selectedAnswer.trim().toLowerCase();
              const isOptCorrect = correctOpt && opt.trim().toLowerCase() === correctOpt.trim().toLowerCase();
              let optClass = '';
              if (isOptSelected) optClass = isCorrect ? 'selected-correct' : 'selected-incorrect';
              else if (isOptCorrect && !isCorrect) optClass = 'correct-answer-outline';
              optionsHtml += `<div class="review-opt ${optClass}"><div class="indicator">${letter}</div><div class="option-text">${opt}</div></div>`;
          });

          card.innerHTML = `
              <div class="review-card-header">
                  <span style="font-weight:700;color:#94a3b8;">Q${index + 1} &nbsp;<span style="color:#64748b;font-size:11px;">${q.subject || ''}</span> ${q.year && q.year > 0 ? '<span style="font-size:10px;background:#fef9c3;color:#854d0e;padding:2px 7px;border-radius:10px;margin-left:4px;">'+q.year+'</span>' : ''}</span>
                  ${badgeHtml}
              </div>
              <div class="q-text" style="font-size:15px;font-weight:600;line-height:1.7;color:#e2e8f0;margin-bottom:12px;">${q.text}</div>
              <div class="review-options">${optionsHtml}</div>
          `;
          container.appendChild(card);
      });
  });

  function goToDashboard() {
      window.location.href = 'selection.html';
  }
</script>

</body>
</html>
